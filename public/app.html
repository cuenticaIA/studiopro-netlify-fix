<!doctype html>
<html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>StudioPRO App</title>
<style>
:root{--bg:#09090b;--panel:#111217;--line:#23252c;--text:#f6f0e5;--muted:#baaf9c;--gold:#d9b57a}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#0e0b12,#09090b);color:var(--text);font-family:Inter,system-ui,sans-serif}header{padding:24px 28px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}main{padding:28px;display:grid;gap:18px}.hero,.grid>div{background:var(--panel);border:1px solid rgba(217,181,122,.18);border-radius:24px;padding:22px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}.pill{display:inline-block;padding:8px 12px;border-radius:999px;background:#201d18;color:#f0d39e}.muted{color:var(--muted)}button{padding:12px 14px;border-radius:12px;border:1px solid var(--line);background:#171920;color:#fff;cursor:pointer}.locked{opacity:.45;filter:grayscale(.25)}
</style></head><body>
<header><div><strong>StudioPRO</strong><div class="muted">Acceso protegido por membresía</div></div><button id="logout">Cerrar sesión</button></header>
<main>
  <div class="hero"><h1 id="welcome">Cargando...</h1><p class="muted">Tus módulos visibles dependen de tu membresía activa.</p><span class="pill" id="plan"></span></div>
  <div class="grid" id="grid"></div>
</main>
<script>
const modules={tutorial:'Tutorial',scene:'Escena',clothes:'Ropas',daily:'Vida cotidiana',output:'Output',updates:'Updates',poses:'Poses',jobs:'Oficios',extras:'Extras',history:'Historial',favorites:'Favoritos',ugc:'UGC',nsfw:'NSFW',cosplay:'Cosplay'};
const allowed={basic:['tutorial','scene','clothes','daily','output','updates'],medium:['tutorial','scene','clothes','daily','output','updates','poses','jobs','extras','history','favorites'],plus:Object.keys(modules)};
fetch('/.netlify/functions/me').then(r=>r.json().then(d=>({ok:r.ok,d}))).then(({ok,d})=>{if(!ok){location.href='/login';return;}welcome.textContent='Bienvenido, '+d.user.name;plan.textContent='Plan '+d.user.membership.toUpperCase();grid.innerHTML=Object.entries(modules).map(([k,v])=>`<div class="${allowed[d.user.membership].includes(k)?'':'locked'}"><strong>${v}</strong><p class="muted">${allowed[d.user.membership].includes(k)?'Disponible en tu membresía':'Bloqueado en tu membresía actual'}</p></div>`).join('');});
document.getElementById('logout').onclick=async()=>{await fetch('/.netlify/functions/logout');location.href='/login';};
</script></body></html>
